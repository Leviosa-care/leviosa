name: backend-${APP_ENV}

services:
  # TODO: add vault service in here to make it work
  backend:
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      vault:
        # condition: service_healthy
    container_name: ${APP_ENV}-backend
    networks:
      - backend-network
    ports:
      - "127.0.0.1:3500:3500"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    build:
      context: .
      dockerfile: local.Dockerfile
    image: api:${APP_ENV}
    env_file: development.env
    volumes:
      - .:/app
      - /go/pkg/mod
      - /root/.cache/go-build
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3500/healthz"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    develop:
      watch:
        - action: sync
          path: ./cmd
          target: /app/cmd
        - action: sync
          path: ./internal
          target: /app/internal
        - action: rebuild
          path: ./go.mod
        - action: rebuild
          path: ./go.sum

  postgres:
    image: postgres:17.5-alpine3.21
    environment:
      POSTGRES_DB: production_leviosa
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432" # Management UI
    networks:
      - backend-network
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d production_leviosa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:alpine
    container_name: ${APP_ENV}-session-manager
    user: redis
    command: redis-server --requirepass secret
    networks:
      - backend-network
    ports:
      - "127.0.0.1:6379:6379" # Management UI
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"        # AMQP
      - "15672:15672"                        # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s



networks:
  backend-network:
    name: ${APP_ENV}-backend-network
    driver: bridge

volumes:
  redis_data:
  pg_data:
