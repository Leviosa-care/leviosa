---
# Fail2ban Configuration Tasks
# - Deploy jail configuration for SSH and Caddy
# - Configure email notifications
# - Enable and start fail2ban service

- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: yes

- name: Ensure fail2ban configuration directory exists
  ansible.builtin.file:
    path: /etc/fail2ban
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy fail2ban jail configuration
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.d/local.conf
    mode: '0644'
  notify: restart fail2ban

- name: Deploy Caddy rate-limit filter
  ansible.builtin.template:
    src: caddy-rate-limit.conf.j2
    dest: /etc/fail2ban/filter.d/caddy-rate-limit.conf
    mode: '0644'
  when: caddy_enabled | default(false)
  notify: restart fail2ban

- name: Ensure fail2ban service is enabled and running
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: yes
