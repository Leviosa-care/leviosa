---
# Rclone Backup Configuration Tasks
# - Install rclone
# - Configure S3 backup
# - Deploy backup and restore scripts
# - Set up cron jobs
# - Configure logrotate

- name: Install rclone
  ansible.builtin.apt:
    name: rclone
    state: present
    update_cache: yes

- name: Ensure rclone configuration directory exists
  ansible.builtin.file:
    path: /home/{{ user }}/.config/rclone
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0700'

- name: Deploy rclone configuration file for AWS S3
  ansible.builtin.copy:
    content: |
      [{{ rclone_aws_remote_name }}]
      type = s3
      provider = AWS
      access_key_id = {{ rclone_aws_access_key }}
      secret_access_key = {{ rclone_aws_secret_key }}
      region = {{ rclone_aws_region }}
      endpoint = {{ rclone_aws_endpoint }}
      location_constraint = {{ rclone_aws_location_constraint }}
      acl = private
      storage_class = {{ rclone_aws_storage_class }}
    dest: /home/{{ user }}/.config/rclone/rclone.conf
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0600'

- name: Ensure rclone is in the user's PATH
  ansible.builtin.lineinfile:
    path: /home/{{ user }}/.bashrc
    line: 'export PATH=$PATH:/usr/bin/rclone'
    create: yes

- name: Deploy the sync script from the files folder
  ansible.builtin.template:
    src: files/backup_database.sh.j2
    dest: /home/{{ user }}/scripts/backup_database.sh
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0755'

- name: Deploy restore script
  ansible.builtin.template:
    src: restore.sh.j2
    dest: /home/{{ user }}/scripts/restore.sh
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0750'

- name: Create backup log directory
  ansible.builtin.file:
    path: /var/backups/leviosa
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0750'

- name: Set up a cron job to run the sync script (fixed syntax)
  ansible.builtin.cron:
    name: "rclone sync script to backup application database"
    user: root
    job: "sudo -u {{ user }} /home/{{ user }}/scripts/backup_database.sh"
    minute: "0"
    hour: "*/6"
    state: present

- name: Create logrotate config for backup logs
  ansible.builtin.copy:
    dest: /etc/logrotate.d/leviosa-backup
    content: |
      /var/backups/leviosa/backup.log {
        daily
        rotate 14
        compress
        delaycompress
        missingok
        notifempty
        create 0640 {{ user }} {{ user }}
      }
    mode: '0644'
