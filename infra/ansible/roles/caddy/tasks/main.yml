---
# Caddy Reverse Proxy Tasks
# Caddy runs as a Docker container (serfriz/caddy-cloudflare) managed by docker-compose.
# This role only creates the directory structure and deploys the Caddyfile.
# The container is started by the app role via docker-compose.

- name: Create Caddy directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0750'
  become: true
  become_user: root
  loop:
    - "{{ caddy_data_dir }}/data"
    - "{{ caddy_data_dir }}/config"
    - "{{ caddy_data_dir }}/logs"

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_data_dir }}/config/Caddyfile"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0640'
  become: true
  become_user: root
  notify: reload caddy
  tags: caddy-config

- name: Mark Caddy as configured
  ansible.builtin.set_fact:
    caddy_configured: true
