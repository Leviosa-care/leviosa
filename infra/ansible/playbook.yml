---
- name: Leviosa VPS - Complete Setup
  hosts: webserver
  become: yes
  remote_user: root
  vars_files:
    - group_vars/secrets.yml

  pre_tasks:
    - name: Display target host
      ansible.builtin.debug:
        msg: "Setting up {{ inventory_hostname }} ({{ ansible_default_ipv4.address | default('unknown') }}) for Leviosa"

    - name: Check if running as root
      ansible.builtin.assert:
        that:
          - ansible_user == 'root'
        fail_msg: "Initial setup must run as root. After first run, use deploy playbook."
        quiet: true

  roles:
    - role: system
      tags: ['system', 'setup']

    - role: common
      tags: ['common', 'setup']

    - role: ssh
      tags: ['ssh', 'security']

    - role: fail2ban
      tags: ['fail2ban', 'security']

    - role: ufw
      tags: ['ufw', 'security']

    - role: docker
      tags: ['docker', 'setup']

    - role: caddy
      tags: ['caddy', 'web']

    - role: gpg
      tags: ['gpg', 'security']

    - role: rclone
      tags: ['rclone', 'backup']

  post_tasks:
    - name: Display setup completion message
      ansible.builtin.debug:
        msg:
          - "==========================================="
          - "Leviosa VPS Setup Complete!"
          - "==========================================="
          - ""
          - "Server: {{ ansible_default_ipv4.address | default('unknown') }}"
          - "Deploy user: {{ user }}"
          - ""
          - "Next steps:"
          - "  1. Copy your .env file to /opt/leviosa/.env"
          - "  2. Run: docker compose up -d"
          - ""
          - "==========================================="

