---
# Leviosa VPS - Backup Setup
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/backup.yml \
#       -e "backup_s3_bucket=my-backup-bucket" \
#       -e "backup_s3_region=eu-central-1"

- name: Leviosa VPS - Configure Backups
  hosts: leviosa_servers
  gather_facts: true
  become: true

  vars:
    # Backup S3 configuration (pass via -e or set here)
    backup_s3_bucket: "{{ lookup('env', 'BACKUP_S3_BUCKET') | default('', true) }}"
    backup_s3_region: "{{ lookup('env', 'BACKUP_S3_REGION') | default('eu-central-1', true) }}"

  pre_tasks:
    - name: Validate backup configuration
      ansible.builtin.assert:
        that:
          - backup_s3_bucket | length > 0
        fail_msg: "backup_s3_bucket must be set. Use: -e 'backup_s3_bucket=your-bucket-name'"
        quiet: true

    - name: Display backup configuration
      ansible.builtin.debug:
        msg:
          - "S3 Bucket: {{ backup_s3_bucket }}"
          - "S3 Region: {{ backup_s3_region }}"

  roles:
    - role: rclone
      tags: ['rclone', 'backup']

  post_tasks:
    - name: Display backup setup completion
      ansible.builtin.debug:
        msg:
          - "==========================================="
          - "Backup Setup Complete!"
          - "==========================================="
          - ""
          - "S3 Bucket: {{ backup_s3_bucket }}"
          - "Restore script: /home/{{ deploy_user }}/scripts/restore.sh"
          - ""
          - "Manual backup:"
          - "  sudo -u {{ deploy_user }} /home/{{ deploy_user }}/scripts/backup_database.sh"
          - ""
          - "Restore:"
          - "  sudo -u {{ deploy_user }} /home/{{ deploy_user }}/scripts/restore.sh daily/<filename>"
          - ""
          - "List backups:"
          - "  aws s3 ls s3://{{ backup_s3_bucket }}/ --recursive"
          - ""
          - "==========================================="
