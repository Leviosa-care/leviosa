---
# Leviosa VPS - Staging Application Deployment
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/deploy-staging.yml
#
# This playbook deploys/updates the staging application without touching system config.
# Staging uses shared services (postgres, redis, caddy) from production to save resources.

- name: Leviosa VPS - Deploy Staging Application
  hosts: leviosa_staging_servers
  gather_facts: true
  become: true
  become_user: "{{ deploy_user }}"

  pre_tasks:
    - name: Display deployment info
      ansible.builtin.debug:
        msg: "Deploying {{ app_name }} (staging) to {{ inventory_hostname }}"

  roles:
    - role: caddy
      tags: ['caddy', 'deploy']
      when: staging_enabled | default(false)

    - role: app
      tags: ['app', 'deploy']

  post_tasks:
    - name: Create staging database in production Postgres
      ansible.builtin.command:
        cmd: docker exec leviosa_postgres psql -U {{ db_user | default('leviosa') }} -d postgres -c 'CREATE DATABASE {{ db_name | default('leviosa_staging') }};'
      register: db_create_result
      failed_when: db_create_result.rc != 0 and 'already exists' not in db_create_result.stderr
      changed_when: db_create_result.rc == 0
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Pull latest images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ app_base_dir }}"
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Restart services
      ansible.builtin.command:
        cmd: docker compose up -d --force-recreate
        chdir: "{{ app_base_dir }}"
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Display deployment completion
      ansible.builtin.debug:
        msg:
          - "==========================================="
          - "Staging Deployment Complete!"
          - "==========================================="
          - "Staging URL: https://staging.{{ app_domain }}"
          - "Status: sudo -u {{ deploy_user }} docker compose ps"
          - "Logs: sudo -u {{ deploy_user }} docker compose logs -f"
          - "==========================================="
