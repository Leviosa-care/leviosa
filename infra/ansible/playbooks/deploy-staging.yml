---
# Leviosa VPS - Staging Application Deployment
# Usage: ansible-playbook -i inventory/hosts playbooks/deploy-staging.yml
#
# This playbook deploys/updates the staging application without touching system config.
# Staging uses shared services (postgres, redis) from production to save resources.

- name: Leviosa VPS - Deploy Staging Application
  hosts: webserver
  gather_facts: true
  become: yes
  remote_user: root
  vars_files:
    - group_vars/secrets.yml
    - group_vars/leviosa_staging.yml
    - group_vars/leviosa_staging.vault.yml

  pre_tasks:
    - name: Display deployment info
      ansible.builtin.debug:
        msg: "Deploying Leviosa STAGING to {{ inventory_hostname }}"

  roles:
    - role: app
      tags: ['app', 'deploy']
      vars:
        app_env: staging
        app_base_dir: "/opt/{{ app_name }}-staging"
        app_data_dir: "/opt/{{ app_name }}-staging/data"
        app_logs_dir: "/opt/{{ app_name }}-staging/logs"
        app_backup_dir: "/opt/{{ app_name }}-staging/backups"
        app_image_tag: "staging"
        frontend_port: 3001
        backend_port: 3501
        use_shared_services: true
        prod_network_name: "{{ app_name }}_network"
        app_env_template: true

    - role: caddy
      tags: ['caddy', 'deploy']

  post_tasks:
    - name: Create staging Docker network (if not exists)
      ansible.builtin.command:
        cmd: docker network create {{ app_name }}_staging_network 2>/dev/null || echo "Network already exists"
      changed_when: false

    - name: Pull latest images and restart services
      ansible.builtin.shell:
        cmd: cd /opt/{{ app_name }}-staging && docker compose pull && docker compose up -d
      become: true
      become_user: "{{ user }}"

    - name: Display deployment completion
      ansible.builtin.debug:
        msg:
          - "==========================================="
          - "Staging Deployment Complete!"
          - "==========================================="
          - "Staging URL: https://staging.{{ app_domain }}"
          - "Status: sudo -u {{ user }} docker compose -f /opt/{{ app_name }}-staging/docker-compose.yml ps"
          - "Logs: sudo -u {{ user }} docker compose -f /opt/{{ app_name }}-staging/docker-compose.yml logs -f"
          - "==========================================="
