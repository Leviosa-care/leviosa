---
# Leviosa VPS - Application Deployment
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/deploy.yml
#
# This playbook deploys/updates the application without touching system config.
# Run after the initial site.yml setup.

- name: Leviosa VPS - Deploy Application
  hosts: leviosa_servers
  gather_facts: true
  become: true
  become_user: "{{ deploy_user }}"

  pre_tasks:
    - name: Display deployment info
      ansible.builtin.debug:
        msg: "Deploying {{ app_name }} to {{ inventory_hostname }}"

  roles:
    - role: caddy
      tags: ['caddy', 'deploy']

    - role: app
      tags: ['app', 'deploy']

  post_tasks:
    - name: Create Vault storage directory with correct ownership
      ansible.builtin.file:
        path: "{{ app_data_dir }}/vault"
        state: directory
        owner: "100"
        group: "1000"
        mode: '0750'
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Create Vault config directory
      ansible.builtin.file:
        path: "{{ app_data_dir }}/vault/config"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0755'
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Generate Vault HCL configuration
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/app/templates/vault.hcl.j2"
        dest: "{{ app_data_dir }}/vault/config/vault.hcl"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0644'
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Pull latest images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ app_base_dir }}"
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Pre-start network diagnostics
      ansible.builtin.shell: |
        echo "=== Processes holding port 8200 or 8201 on the host ==="
        ss -tlnp 2>/dev/null | grep -E ':8200|:8201' || echo "(nothing on 8200/8201)"
        echo "=== All running containers ==="
        docker ps -a 2>/dev/null || echo "(docker ps failed)"
        echo "=== Vault section of docker-compose.yml ==="
        grep -A 30 'container_name: {{ app_name }}_vault' {{ app_base_dir }}/docker-compose.yml 2>/dev/null || echo "(not found)"
      register: pre_start_diag
      become: true
      become_user: root
      changed_when: false
      failed_when: false
      when: app_deployed | default(false)

    - name: Print pre-start diagnostics
      ansible.builtin.debug:
        msg: "{{ pre_start_diag.stdout_lines | default([]) }}"
      when: app_deployed | default(false)

    - name: Check current Vault health
      ansible.builtin.shell: |
        RUNNING=$(docker inspect {{ app_name }}_vault 2>/dev/null | \
          python3 -c "import json,sys; print(json.load(sys.stdin)[0]['State']['Running'])" 2>/dev/null || echo "False")
        if [ "$RUNNING" != "True" ]; then echo "stopped"; exit 0; fi
        STATUS=$(docker exec {{ app_name }}_vault vault status -format=json 2>/dev/null || echo '{"sealed":true}')
        SEALED=$(echo "$STATUS" | python3 -c "import json,sys; print(json.loads(sys.stdin.read()).get('sealed', True))" 2>/dev/null || echo "True")
        if [ "$SEALED" = "False" ]; then echo "healthy"; else echo "sealed"; fi
      register: vault_health_check
      changed_when: false
      failed_when: false
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Print Vault health check result
      ansible.builtin.debug:
        msg: "Vault pre-check: {{ vault_health_check.stdout | default('unknown') }} — {{ 'skipping stop/start' if vault_health_check.stdout | default('') == 'healthy' else 'will restart vault' }}"
      when: app_deployed | default(false)

    - name: Stop existing Vault container before recreating
      ansible.builtin.shell: |
        docker stop {{ app_name }}_vault 2>/dev/null || true
        docker rm {{ app_name }}_vault 2>/dev/null || true
      become: true
      become_user: root
      changed_when: false
      when:
        - app_deployed | default(false)
        - vault_health_check.stdout | default('stopped') != 'healthy'

    - name: Check if Vault was previously initialized successfully
      ansible.builtin.stat:
        path: "{{ app_data_dir }}/vault/vault-keys.txt"
      register: vault_keys_stat
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Wipe stale Vault data for clean initialization
      ansible.builtin.shell: |
        rm -rf {{ app_data_dir }}/vault/data
        echo "Wiped stale vault data — will initialize fresh"
      become: true
      become_user: root
      when:
        - app_deployed | default(false)
        - vault_health_check.stdout | default('stopped') != 'healthy'
        - not vault_keys_stat.stat.exists

    - name: Start Vault container
      ansible.builtin.command:
        cmd: docker compose up -d vault
        chdir: "{{ app_base_dir }}"
      become: true
      become_user: root
      when:
        - app_deployed | default(false)
        - vault_health_check.stdout | default('stopped') != 'healthy'

    - name: Wait for Vault to be ready
      ansible.builtin.command:
        cmd: docker exec {{ app_name }}_vault vault status
      register: vault_status
      until: vault_status.rc != 1
      retries: 10
      delay: 3
      changed_when: false
      failed_when: false
      become: true
      become_user: root
      when:
        - app_deployed | default(false)
        - vault_health_check.stdout | default('stopped') != 'healthy'

    - name: Collect Vault diagnostics
      ansible.builtin.shell: |
        echo "=== Vault container state ==="
        docker inspect {{ app_name }}_vault 2>/dev/null | \
          python3 -c "import json,sys; d=json.load(sys.stdin)[0]['State']; print('Status=' + d['Status'] + ' ExitCode=' + str(d['ExitCode']))" 2>/dev/null || echo "inspect failed"
        echo "=== Vault storage directory permissions ==="
        ls -lan {{ app_data_dir }}/vault/ 2>/dev/null || echo "(directory missing)"
        echo "=== Vault config file contents ==="
        cat {{ app_data_dir }}/vault/config/vault.hcl 2>/dev/null || echo "(vault.hcl missing)"
        echo "=== Last 80 lines of Vault logs ==="
        docker logs --tail 80 {{ app_name }}_vault 2>&1 || echo "(no logs)"
      register: vault_diag
      become: true
      become_user: root
      changed_when: false
      failed_when: false
      when: app_deployed | default(false)

    - name: Print Vault diagnostics
      ansible.builtin.debug:
        msg: "{{ vault_diag.stdout_lines | default([]) }}"
      when: app_deployed | default(false)

    - name: Check Vault status
      ansible.builtin.command:
        cmd: docker exec {{ app_name }}_vault vault status -format=json
      register: vault_status_json
      changed_when: false
      failed_when: false
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Set Vault status defaults
      ansible.builtin.set_fact:
        vault_initialized: false
        vault_sealed: true
      when: app_deployed | default(false)

    - name: Parse Vault status
      ansible.builtin.set_fact:
        vault_initialized: "{{ (vault_status_json.stdout | from_json).initialized | bool }}"
        vault_sealed: "{{ (vault_status_json.stdout | from_json).sealed | bool }}"
      when:
        - app_deployed | default(false)
        - vault_status_json.stdout is defined
        - vault_status_json.stdout | length > 0

    - name: Initialize Vault (first time only)
      ansible.builtin.command:
        cmd: docker exec {{ app_name }}_vault vault operator init -key-shares=3 -key-threshold=2 -format=json
      register: vault_init_output
      when:
        - app_deployed | default(false)
        - not (vault_initialized | default(false) | bool)
      become: true
      become_user: root
      failed_when: false
      no_log: true

    - name: Save Vault unseal keys and root token
      ansible.builtin.copy:
        content: |
          VAULT_UNSEAL_KEY_1: {{ vault_init_output.stdout | from_json | json_query('unseal_keys_b64[0]') }}
          VAULT_UNSEAL_KEY_2: {{ vault_init_output.stdout | from_json | json_query('unseal_keys_b64[1]') }}
          VAULT_UNSEAL_KEY_3: {{ vault_init_output.stdout | from_json | json_query('unseal_keys_b64[2]') }}
          VAULT_ROOT_TOKEN: {{ vault_init_output.stdout | from_json | json_query('root_token') }}
        dest: "{{ app_data_dir }}/vault/vault-keys.txt"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0600'
      when:
        - app_deployed | default(false)
        - vault_init_output.stdout is defined
        - vault_init_output.stdout | length > 0
      become: true
      become_user: root
      no_log: true

    - name: Restart Vault after init for clean raft state
      ansible.builtin.shell: |
        docker restart {{ app_name }}_vault
      become: true
      become_user: root
      changed_when: true
      when:
        - app_deployed | default(false)
        - vault_init_output is defined
        - vault_init_output.stdout is defined
        - vault_init_output.stdout | length > 0

    - name: Wait for Vault to be ready after init-restart
      ansible.builtin.command:
        cmd: docker exec {{ app_name }}_vault vault status
      register: vault_post_restart_status
      until: vault_post_restart_status.rc != 1
      retries: 20
      delay: 3
      changed_when: false
      failed_when: false
      become: true
      become_user: root
      when:
        - app_deployed | default(false)
        - vault_init_output is defined
        - vault_init_output.stdout is defined
        - vault_init_output.stdout | length > 0

    - name: Load Vault credentials from file
      ansible.builtin.slurp:
        src: "{{ app_data_dir }}/vault/vault-keys.txt"
      register: vault_keys_file
      failed_when: false
      when: app_deployed | default(false)
      become: true
      become_user: root
      no_log: true

    - name: Parse Vault credentials
      ansible.builtin.set_fact:
        vault_unseal_key_1: "{{ vault_keys_file.content | b64decode | regex_search('VAULT_UNSEAL_KEY_1: ([^\\n]+)', '\\1') | first }}"
        vault_unseal_key_2: "{{ vault_keys_file.content | b64decode | regex_search('VAULT_UNSEAL_KEY_2: ([^\\n]+)', '\\1') | first }}"
        vault_root_token: "{{ vault_keys_file.content | b64decode | regex_search('VAULT_ROOT_TOKEN: ([^\\n]+)', '\\1') | first }}"
      when:
        - app_deployed | default(false)
        - vault_keys_file.content is defined
      no_log: true

    - name: Override Vault credentials with fresh init values
      ansible.builtin.set_fact:
        vault_unseal_key_1: "{{ vault_init_output.stdout | from_json | json_query('unseal_keys_b64[0]') }}"
        vault_unseal_key_2: "{{ vault_init_output.stdout | from_json | json_query('unseal_keys_b64[1]') }}"
        vault_root_token: "{{ vault_init_output.stdout | from_json | json_query('root_token') }}"
      when:
        - app_deployed | default(false)
        - vault_init_output is defined
        - vault_init_output.stdout is defined
        - vault_init_output.stdout | length > 0
      no_log: true

    - name: Debug Vault credential lengths
      ansible.builtin.debug:
        msg: "key1_len={{ vault_unseal_key_1 | default('') | length }}, key2_len={{ vault_unseal_key_2 | default('') | length }}, token_len={{ vault_root_token | default('') | length }}"
      when: app_deployed | default(false)

    - name: Unseal Vault with key 1
      ansible.builtin.command:
        cmd: docker exec {{ app_name }}_vault vault operator unseal {{ vault_unseal_key_1 }}
      register: unseal_key1_result
      when:
        - app_deployed | default(false)
        - vault_sealed | default(false) | bool
        - vault_unseal_key_1 is defined
      become: true
      become_user: root
      failed_when: false
      no_log: true

    - name: Unseal Vault with key 2
      ansible.builtin.command:
        cmd: docker exec {{ app_name }}_vault vault operator unseal {{ vault_unseal_key_2 }}
      register: unseal_key2_result
      when:
        - app_deployed | default(false)
        - vault_sealed | default(false) | bool
        - vault_unseal_key_2 is defined
      become: true
      become_user: root
      failed_when: false
      no_log: true

    - name: Wait for Vault post-unseal setup to complete
      ansible.builtin.shell: |
        for i in $(seq 1 15); do
          STATUS=$(docker exec {{ app_name }}_vault vault status -format=json 2>/dev/null || echo '{"sealed":true}')
          SEALED=$(echo "$STATUS" | python3 -c "import json,sys; print(json.loads(sys.stdin.read()).get('sealed', True))" 2>/dev/null || echo "True")
          if [ "$SEALED" = "False" ]; then
            echo "vault_unsealed"
            exit 0
          fi
          sleep 2
        done
        echo "vault_still_sealed_after_30s"
        exit 0
      register: post_unseal_wait
      changed_when: false
      failed_when: false
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Print post-unseal wait result
      ansible.builtin.debug:
        msg: "{{ post_unseal_wait.stdout | default('skipped') }}"
      when: app_deployed | default(false)

    - name: Collect post-unseal Vault logs
      ansible.builtin.shell: |
        docker logs --tail 200 {{ app_name }}_vault 2>&1 || echo "(no logs)"
      register: post_unseal_vault_logs
      changed_when: false
      failed_when: false
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Print post-unseal Vault logs
      ansible.builtin.debug:
        msg: "{{ post_unseal_vault_logs.stdout_lines | default([]) }}"
      when: app_deployed | default(false)

    - name: Check Vault seal state after unseal attempt
      ansible.builtin.command:
        cmd: docker exec {{ app_name }}_vault vault status -format=json
      register: post_unseal_seal_state
      changed_when: false
      failed_when: false
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Fail on unseal error
      ansible.builtin.fail:
        msg: >-
          Unseal failed (key1_rc={{ unseal_key1_result.rc | default('skipped') }},
          key2_rc={{ unseal_key2_result.rc | default('skipped') }}).
          Keys in vault-keys.txt likely do not match the current raft state.
          On the VPS, stop the vault container and delete vault-keys.txt, vault.db,
          and the raft/ directory, then redeploy to re-initialize cleanly.
      when:
        - app_deployed | default(false)
        - (unseal_key1_result.rc | default(0)) != 0 or (unseal_key2_result.rc | default(0)) != 0
        - (post_unseal_seal_state.stdout | default('{"sealed":true}') | from_json).sealed | bool

    - name: Wait for Vault to be unsealed
      ansible.builtin.command:
        cmd: docker exec {{ app_name }}_vault vault status
      register: vault_unsealed_status
      until: vault_unsealed_status.rc == 0
      retries: 5
      delay: 2
      changed_when: false
      failed_when: false
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Verify Vault seal status
      ansible.builtin.command:
        cmd: docker exec {{ app_name }}_vault vault status -format=json
      register: vault_seal_verify
      changed_when: false
      failed_when: false
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Print Vault seal status
      ansible.builtin.debug:
        msg: "{{ vault_seal_verify.stdout | from_json }}"
      when:
        - app_deployed | default(false)
        - vault_seal_verify.stdout | default('') | length > 0

    - name: Fail if Vault is still sealed
      ansible.builtin.fail:
        msg: "Vault is still sealed after unseal attempt — check vault-keys.txt and raft storage integrity."
      when:
        - app_deployed | default(false)
        - vault_seal_verify.stdout | default('') | length > 0
        - (vault_seal_verify.stdout | from_json).sealed | bool

    - name: Create vault-token file for root token
      ansible.builtin.copy:
        content: "{{ vault_root_token }}"
        dest: "{{ app_base_dir }}/.vault-token"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0600'
      become: true
      become_user: root
      when:
        - app_deployed | default(false)
        - vault_root_token is defined
      no_log: true

    - name: Update VAULT_TOKEN in .env with actual root token
      ansible.builtin.lineinfile:
        path: "{{ app_base_dir }}/.env"
        regexp: '^VAULT_TOKEN='
        line: "VAULT_TOKEN={{ vault_root_token }}"
      become: true
      become_user: root
      when:
        - app_deployed | default(false)
        - vault_root_token is defined
      no_log: true

    - name: Enable Transit secrets engine
      ansible.builtin.shell: |
        docker exec \
          -e VAULT_ADDR=http://127.0.0.1:8200 \
          -e VAULT_TOKEN={{ vault_root_token }} \
          {{ app_name }}_vault \
          vault secrets enable -path=transit transit 2>&1 || true
      become: true
      become_user: root
      when:
        - app_deployed | default(false)
        - vault_root_token is defined
      changed_when: false
      no_log: true

    - name: Enable KV v2 secrets engine
      ansible.builtin.shell: |
        docker exec \
          -e VAULT_ADDR=http://127.0.0.1:8200 \
          -e VAULT_TOKEN={{ vault_root_token }} \
          {{ app_name }}_vault \
          vault secrets enable -path=secret kv-v2 2>&1 || true
      become: true
      become_user: root
      when:
        - app_deployed | default(false)
        - vault_root_token is defined
      changed_when: false
      no_log: true

    - name: Create encryption keys for ENCX
      ansible.builtin.shell: |
        docker exec \
          -e VAULT_ADDR=http://127.0.0.1:8200 \
          -e VAULT_TOKEN={{ vault_root_token }} \
          {{ app_name }}_vault \
          vault write -f transit/keys/{{ item }} 2>&1 || true
      loop:
        - "{{ encx_kek_alias | default('leviosa-kek') }}"
        - "{{ encx_pepper_alias | default('leviosa') }}"
      become: true
      become_user: root
      when:
        - app_deployed | default(false)
        - vault_root_token is defined
      changed_when: false
      no_log: true

    - name: Restart all services except Vault
      ansible.builtin.shell: |
        services=$(docker compose config --services | grep -v '^vault$' | tr '\n' ' ' | xargs)
        if [ -z "$services" ]; then
          echo "No non-vault services to restart"
        else
          docker compose up -d --force-recreate $services
        fi
      args:
        chdir: "{{ app_base_dir }}"
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Show compose status
      ansible.builtin.command:
        cmd: docker compose ps
        chdir: "{{ app_base_dir }}"
      become: true
      become_user: root
      when: app_deployed | default(false)
      changed_when: false

    - name: Ensure Vault is connected to app network
      ansible.builtin.shell: |
        docker network connect {{ app_name }}_network {{ app_name }}_vault 2>/dev/null || true
      become: true
      become_user: root
      changed_when: false
      when: app_deployed | default(false)

    - name: Get Vault IP on app network
      ansible.builtin.shell: |
        for i in $(seq 1 15); do
          IP=$(docker inspect {{ app_name }}_vault 2>/dev/null | \
            python3 -c "import json,sys; d=json.load(sys.stdin); s=d[0]['State']['Status']; net=d[0]['NetworkSettings']['Networks'].get('{{ app_name }}_network',{}); ip=net.get('IPAddress',''); print(ip) if s=='running' and ip else None" \
            2>/dev/null || true)
          if [ -n "$IP" ]; then echo "$IP"; exit 0; fi
          sleep 2
        done
        echo "Vault did not reach running state after 30s. Last inspect:" >&2
        docker inspect {{ app_name }}_vault 2>&1 | head -30 >&2 || true
        exit 1
      register: vault_network_ip
      become: true
      become_user: root
      changed_when: false
      failed_when: vault_network_ip.rc != 0
      when: app_deployed | default(false)

    - name: Seed admin users
      when: app_deployed | default(false) and seed_admins is defined
      become: true
      become_user: root
      block:
        - name: Write seed data file
          ansible.builtin.copy:
            content: "{{ seed_admins | to_json }}"
            dest: "{{ app_base_dir }}/seed_data.json"
            owner: root
            group: root
            mode: '0644'

        - name: Run database seeder
          ansible.builtin.shell: |
            VAULT_IP="{{ vault_network_ip.stdout | trim }}"
            if [ -z "$VAULT_IP" ]; then
              echo "ERROR: Could not determine Vault IP on {{ app_name }}_network"
              docker inspect {{ app_name }}_vault 2>&1 | head -20 || echo "Container not found"
              exit 1
            fi
            docker run --rm \
              --network {{ app_name }}_network \
              --env-file {{ app_base_dir }}/.env \
              -e VAULT_ADDR=http://${VAULT_IP}:8200 \
              -v {{ app_base_dir }}/seed_data.json:/app/seed_data.json:ro \
              -e SEED_DATA_PATH=/app/seed_data.json \
              {{ backend_docker_image }} ./seed

      always:
        - name: Remove seed data file
          ansible.builtin.file:
            path: "{{ app_base_dir }}/seed_data.json"
            state: absent
          become: true
          become_user: root

    - name: Display deployment completion
      ansible.builtin.debug:
        msg:
          - "==========================================="
          - "Deployment Complete!"
          - "==========================================="
          - "Application: https://{{ app_domain }}"
          - "Status: sudo -u {{ deploy_user }} docker compose ps"
          - "Logs: sudo -u {{ deploy_user }} docker compose logs -f"
          - "==========================================="
