---
# Leviosa VPS - Application Deployment
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/deploy.yml
#
# This playbook deploys/updates the application without touching system config.
# Run after the initial site.yml setup.

- name: Leviosa VPS - Deploy Application
  hosts: leviosa_servers
  gather_facts: true
  become: true
  become_user: "{{ deploy_user }}"

  pre_tasks:
    - name: Display deployment info
      ansible.builtin.debug:
        msg: "Deploying {{ app_name }} to {{ inventory_hostname }}"

  roles:
    - role: caddy
      tags: ['caddy', 'deploy']

    - role: app
      tags: ['app', 'deploy']

  post_tasks:
    - name: Pull latest images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ app_base_dir }}"
      become: true
      become_user: root
      when: app_deployed | default(false)

    - name: Restart services
      ansible.builtin.command:
        cmd: docker compose up -d --force-recreate
        chdir: "{{ app_base_dir }}"
      become: true
      become_user: root
      when: app_deployed | default(false)
      register: compose_up
      failed_when: false

    - name: Show compose status
      ansible.builtin.command:
        cmd: docker compose ps
        chdir: "{{ app_base_dir }}"
      become: true
      become_user: root
      when: app_deployed | default(false)
      changed_when: false

    - name: Display deployment completion
      ansible.builtin.debug:
        msg:
          - "==========================================="
          - "Deployment Complete!"
          - "==========================================="
          - "Application: https://{{ app_domain }}"
          - "Status: sudo -u {{ deploy_user }} docker compose ps"
          - "Logs: sudo -u {{ deploy_user }} docker compose logs -f"
          - "==========================================="
