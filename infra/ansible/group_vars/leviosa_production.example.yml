---
# Leviosa Production Secrets — Example
# Copy to leviosa_production.yml and fill in your actual values.
# Same structure as leviosa_staging.yml — only the values differ.

# ============================================
# Contact
# ============================================
contact_email: "admin@leviosa.care"

# ============================================
# Database
# ============================================
db_user: "leviosa"
db_password: "your_secure_postgres_password_here"
db_name: "leviosa"

# ============================================
# Session
# ============================================
session_secret: "your_random_32_character_string_here_min_length"

# ============================================
# AWS S3
# ============================================
s3_bucket: "staging-leviosa-assets"
s3_region: "eu-central-1"
s3_public_url: "https://s3.eu-central-1.amazonaws.com/staging-leviosa-assets"
media_url: "https://s3.eu-central-1.amazonaws.com/staging-leviosa-assets/media"

# ============================================
# AWS Credentials
# ============================================
aws_access_key_id: "AKIAIOSFODNN7EXAMPLE"
aws_secret_access_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
aws_region: "eu-central-1"

# ============================================
# Email (SES/SMTP)
# ============================================
smtp_from_email: "noreply@leviosa.care"
smtp_from_name: "Leviosa"

# ============================================
# Stripe (live keys)
# ============================================
stripe_secret_key: "sk_live_your_stripe_live_secret_key"
stripe_webhook_secret: "whsec_your_stripe_webhook_secret"
stripe_publishable_key: "pk_live_your_stripe_publishable_key"

# ============================================
# Cron Security
# ============================================
cron_secret: "change-me-to-a-secure-random-string-min-32-chars"

# ============================================
# Public URL
# ============================================
public_url: "https://leviosa.care"

# ============================================
# File Upload
# ============================================
max_file_size: "10485760"
allowed_image_types: "image/jpeg,image/png,image/webp,image/gif"
allowed_video_types: "video/mp4,video/webm,video/quicktime"
body_size_limit: "15728640"

# ============================================
# Mock Data Mode
# ============================================
use_mock_data: "false"

# ============================================
# Coming Soon Mode
# ============================================
# Set to "true" to redirect all routes to /coming-soon on production
# Set to "false" when the app is ready to launch
coming_soon: "true"

# ============================================
# Monitoring
# ============================================
sentry_dsn: ""
use_scheduler: "false"

# ============================================
# Caddy Cloudflare API Token (for DNS-01 challenge)
# ============================================
caddy_cloudflare_api_token: "your_cloudflare_api_token_here"
