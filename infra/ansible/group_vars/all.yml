---
# Leviosa - Group Variables
# These variables apply to all hosts

# ============================================
# Deploy User Configuration
# ============================================
deploy_user: leviosa
deploy_user_groups: ["sudo", "docker"]

# SECURITY: Restrict sudo to specific commands (recommended: true)
# Set to false for development/convenience, true for production
deploy_sudo_restricted: true

# SECURITY: Allow password-based sudo as fallback (requires deploy user password)
# Set to true if you want to allow other commands with password
deploy_sudo_password_fallback: false

# Your public SSH key for the deploy user
# You can also set this via: ansible-playbook --extra-vars "deploy_ssh_public_key=$(cat ~/.ssh/leviosa.pub)"
deploy_ssh_public_key: "{{ lookup('env', 'DEPLOY_SSH_PUBLIC_KEY') | default('', true) }}"

# ============================================
# System Configuration
# ============================================
# System timezone
system_timezone: Etc/UTC

# Automatic security updates
auto_security_updates: true
auto_updates_reboot: false
auto_updates_email: "{{ contact_email | default('root@localhost') }}"
auto_updates_blacklist:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# ============================================
# Docker Configuration
# ============================================
docker_daemon_options:
  log-driver: "json-file"
  log-opts:
    max-size: "10m"
    max-file: "3"
  # SECURITY: Metrics endpoint bound to localhost only
  # Change to "0.0.0.0:9323" ONLY if using Prometheus with firewall rules
  metrics-addr: "127.0.0.1:9323"
  experimental: false

# Docker Security Hardening
# SECURITY: Disable inter-container communication on default bridge
# User-defined networks (like leviosa_network) are unaffected
docker_daemon_icc: false
docker_daemon_userland_proxy: false
docker_daemon_no_new_privileges: true
docker_daemon_live_restore: true
docker_daemon_ulimit_nofile: 64000

# ============================================
# Fail2ban Configuration
# ============================================
fail2ban_enabled: true
# IPs to never ban (localhost + your public IP)
fail2ban_ignoreip: "127.0.0.1/8 ::1"
fail2ban_maxretry: 5
fail2ban_bantime: 3600
fail2ban_findtime: 600
fail2ban_ssh_maxretry: 3
fail2ban_ssh_bantime: 7200
fail2ban_ddos_maxretry: 2
fail2ban_ddos_bantime: 86400
fail2ban_caddy_maxretry: 5
fail2ban_notify_email: "{{ contact_email | default('root@localhost') }}"

# ============================================
# Caddy Reverse Proxy Configuration
# ============================================
# Cloudflare API token for DNS-01 challenge (stored in vault)
# caddy_cloudflare_api_token is defined in secrets.yml and used directly by the caddy role

# Set to true once staging is deployed to include staging site blocks in Caddyfile
staging_enabled: false

# ============================================
# Application Environment Variables
# ============================================
# db_user, db_password, db_name, session_secret are defined in secrets.yml
# and used directly by templates — no mapping needed here.
app_env_vars:
  S3_BUCKET: "{{ s3_bucket | default('') }}"
  S3_REGION: "{{ s3_region | default('eu-central-1') }}"
  S3_PUBLIC_URL: "{{ s3_public_url | default('') }}"
  MEDIA_URL: "{{ media_url | default('') }}"

  AWS_ACCESS_KEY_ID: "{{ aws_access_key_id | default('') }}"
  AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key | default('') }}"
  AWS_REGION: "{{ aws_region | default('eu-central-1') }}"

  SMTP_FROM_EMAIL: "{{ smtp_from_email | default('noreply@' + app_domain) }}"
  SMTP_FROM_NAME: "{{ smtp_from_name | default('Leviosa') }}"
  CONTACT_EMAIL: "{{ contact_email | default('contact@' + app_domain) }}"

  STRIPE_SECRET_KEY: "{{ stripe_secret_key | default('') }}"
  STRIPE_WEBHOOK_SECRET: "{{ stripe_webhook_secret | default('') }}"
  STRIPE_PUBLISHABLE_KEY: "{{ stripe_publishable_key | default('') }}"

  CRON_SECRET: "{{ cron_secret | default('change-me-to-a-secure-random-string-min-32-chars') }}"

  PUBLIC_URL: "{{ public_url | default('https://' + app_domain) }}"

  MAX_FILE_SIZE: "{{ max_file_size | default('10485760') }}"
  ALLOWED_IMAGE_TYPES: "{{ allowed_image_types | default('image/jpeg,image/png,image/webp,image/gif') }}"
  ALLOWED_VIDEO_TYPES: "{{ allowed_video_types | default('video/mp4,video/webm,video/quicktime') }}"
  BODY_SIZE_LIMIT: "{{ body_size_limit | default('15728640') }}"

  USE_MOCK_DATA: "{{ use_mock_data | default('false') }}"

  SENTRY_DSN: "{{ sentry_dsn | default('') }}"
  USE_SCHEDULER: "{{ use_scheduler | default('false') }}"

# ============================================
# Backup Configuration
# ============================================
backup_enabled: true
backup_schedule_daily: "0 2 * * *"
backup_schedule_weekly: "0 3 * * 0"
backup_schedule_monthly: "0 4 1 * *"
backup_volumes_enabled: true
backup_configs_enabled: true
backup_s3_storage_class: "STANDARD_IA"

# ============================================
# Monitoring (Optional)
# ============================================
monitoring_enabled: false
monitoring_cadvisor_port: 8081
monitoring_node_exporter_port: 9100
