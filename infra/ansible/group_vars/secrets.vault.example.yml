# Ansible Vault - Example Variables
# Copy this file to secrets.yml and fill in your actual values
# Then encrypt it with: ansible-vault encrypt group_vars/secrets.yml

# ============================================
# User Configuration
# ============================================
user: "your-username"
ssh_public_key: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC... your_email@example.com"

# ============================================
# Caddy Basic Auth (for staging)
# ============================================
caddy_basic_auth_username: "admin"
caddy_basic_auth_password_hash: "$2a$14$..."  # Generate with: caddy hash-password

# ============================================
# Database Credentials
# ============================================
postgres_user: "leviosa"
postgres_password: "your_secure_postgres_password_here"
postgres_db: "leviosa"

# ============================================
# AWS Credentials (from Terraform outputs)
# ============================================
# Run: terraform output -raw vault_user_access_key_id
vault_aws_access_key_id: "AKIAIOSFODNN7EXAMPLE"
vault_aws_secret_access_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"

# ============================================
# Rclone S3 Backup Configuration
# ============================================
rclone_aws_remote_name: "s3-backup"
rclone_aws_access_key: "AKIAIOSFODNN7EXAMPLE"
rclone_aws_secret_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
rclone_aws_region: "eu-central-1"
rclone_aws_endpoint: "https://s3.eu-central-1.amazonaws.com"
rclone_aws_location_constraint: "eu-central-1"
rclone_aws_storage_class: "STANDARD"
rclone_aws_bucket_name: "staging-leviosa-backups"

# ============================================
# Email Configuration (SES)
# ============================================
ses_from_email: "noreply@leviosa.care"
ses_from_name: "Leviosa"

# ============================================
# Application Secrets
# ============================================
session_secret: "your_random_32_character_string_here"
vault_token: "your-vault-token-here"

# ============================================
# GPG Encryption (for backups)
# ============================================
gpg_recipient: "your-gpg-key-id"

# ============================================
# Fail2ban Configuration
# ============================================
fail2ban_ignoreip: "127.0.0.1/8 ::1"
fail2ban_bantime: 3600
fail2ban_findtime: 600
fail2ban_maxretry: 5
fail2ban_ssh_maxretry: 3
fail2ban_ssh_bantime: 3600
fail2ban_ddos_maxretry: 5
fail2ban_ddos_bantime: 86400
fail2ban_notify_email: "admin@leviosa.care"

# ============================================
# SSH Configuration
# ============================================
ssh_port: 22

# ============================================
# System Configuration
# ============================================
system_timezone: "Europe/Berlin"
auto_security_updates: true

# ============================================
# App Directories
# ============================================
app_base_dir: "/opt/leviosa"
app_data_dir: "/opt/leviosa/data"
app_logs_dir: "/opt/leviosa/logs"
app_backup_dir: "/opt/leviosa/backups"

# ============================================
# Docker Configuration
# ============================================
docker_log_max_size: "10m"
docker_log_max_files: "3"
docker_metrics_addr: "127.0.0.1:9323"
docker_icc: false
docker_userland_proxy: false
docker_no_new_privileges: true
docker_live_restore: true
docker_ulimit_nofile: 65536

# ============================================
# Caddy Configuration
# ============================================
caddy_enabled: true
caddy_log_path: "/var/log/caddy/access.log"
caddy_client_max_body_size: "100M"
