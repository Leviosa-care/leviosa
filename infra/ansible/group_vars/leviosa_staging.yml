---
# Leviosa Staging — Config and Secrets
# Overrides for the leviosa_staging_servers group.
# Same structure as secrets.yml — only the values differ.
# Staging shares postgres, redis, and caddy from the production stack.
# Only the app container is separate, running in the prod Docker network.

# ============================================
# Application
# ============================================
app_name: leviosa_staging
app_env: staging
app_base_dir: /opt/leviosa-staging
app_data_dir: "{{ app_base_dir }}/data"
app_logs_dir: "{{ app_base_dir }}/logs"
app_backup_dir: "{{ app_base_dir }}/backups"

# ============================================
# Shared Services
# ============================================
# When true, the compose file only deploys the app container and attaches
# it to prod's Docker network. Postgres and Redis are not created.
use_shared_services: true

# Production Docker network the staging app container joins
prod_network_name: leviosa_network

# ============================================
# Database (shared postgres, separate DB)
# ============================================
db_password: "your_staging_db_password_here"
db_name: leviosa_staging
# db_user is inherited from secrets.yml (same postgres instance)

# ============================================
# Redis (shared instance, separate DB index)
# ============================================
# 0 = production, 1 = staging
redis_db: 1

# ============================================
# Session
# ============================================
session_secret: "your_random_32_character_string_here_for_staging"

# ============================================
# AWS S3 (dedicated staging bucket)
# ============================================
s3_bucket: "staging-leviosa-assets"
s3_region: "eu-central-1"
s3_public_url: "https://s3.eu-central-1.amazonaws.com/staging-leviosa-assets"
media_url: "https://s3.eu-central-1.amazonaws.com/staging-leviosa-assets/media"

# ============================================
# AWS Credentials (staging IAM user)
# ============================================
aws_access_key_id: "AKIAIOSFODNN7EXAMPLE"
aws_secret_access_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
aws_region: "eu-central-1"

# ============================================
# Email (SES/SMTP)
# ============================================
smtp_from_email: "staging@leviosa.care"
smtp_from_name: "Leviosa Staging"

# ============================================
# Stripe (test keys)
# ============================================
stripe_secret_key: "sk_test_your_stripe_test_secret_key"
stripe_webhook_secret: "whsec_your_stripe_test_webhook_secret"
stripe_publishable_key: "pk_test_your_stripe_test_publishable_key"

# ============================================
# Cron Security
# ============================================
cron_secret: "change-me-staging-cron-secret-min-32-chars"

# ============================================
# Public URL
# ============================================
public_url: "https://staging.leviosa.care"

# ============================================
# File Upload (same limits as production)
# ============================================
max_file_size: "10485760"
allowed_image_types: "image/jpeg,image/png,image/webp,image/gif"
allowed_video_types: "video/mp4,video/webm,video/quicktime"
body_size_limit: "15728640"

# ============================================
# Mock Data Mode
# ============================================
use_mock_data: "false"

# ============================================
# Monitoring
# ============================================
sentry_dsn: ""
use_scheduler: "false"

# ============================================
# Caddy
# ============================================
# Caddy is NOT deployed for staging — it is managed by the prod stack.
# Staging site blocks are added to prod's Caddyfile via staging_enabled=true.
caddy_enabled: false

# ============================================
# Application Environment Variables
# ============================================
# Full override of all.yml app_env_vars for staging.
app_env_vars:
  S3_BUCKET: "{{ s3_bucket | default('') }}"
  S3_REGION: "{{ s3_region | default('eu-central-1') }}"
  S3_PUBLIC_URL: "{{ s3_public_url | default('') }}"
  MEDIA_URL: "{{ media_url | default('') }}"

  AWS_ACCESS_KEY_ID: "{{ aws_access_key_id | default('') }}"
  AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key | default('') }}"
  AWS_REGION: "{{ aws_region | default('eu-central-1') }}"

  SMTP_FROM_EMAIL: "{{ smtp_from_email | default('staging@' + app_domain) }}"
  SMTP_FROM_NAME: "{{ smtp_from_name | default('Leviosa Staging') }}"
  CONTACT_EMAIL: "{{ contact_email | default('contact@' + app_domain) }}"

  STRIPE_SECRET_KEY: "{{ stripe_secret_key | default('') }}"
  STRIPE_WEBHOOK_SECRET: "{{ stripe_webhook_secret | default('') }}"
  STRIPE_PUBLISHABLE_KEY: "{{ stripe_publishable_key | default('') }}"

  CRON_SECRET: "{{ cron_secret | default('change-me-staging-cron-secret-min-32-chars') }}"

  PUBLIC_URL: "{{ public_url | default('https://staging.' + app_domain) }}"

  MAX_FILE_SIZE: "{{ max_file_size | default('10485760') }}"
  ALLOWED_IMAGE_TYPES: "{{ allowed_image_types | default('image/jpeg,image/png,image/webp,image/gif') }}"
  ALLOWED_VIDEO_TYPES: "{{ allowed_video_types | default('video/mp4,video/webm,video/quicktime') }}"
  BODY_SIZE_LIMIT: "{{ body_size_limit | default('15728640') }}"

  USE_MOCK_DATA: "false"
  SENTRY_DSN: "{{ sentry_dsn | default('') }}"
  USE_SCHEDULER: "false"
