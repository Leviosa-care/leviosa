---
# Leviosa Staging Environment Variables (Sensitive)
# This is an example file - create leviosa_staging.vault.yml with actual values
# Encrypt with: ansible-vault encrypt group_vars/leviosa_staging.vault.yml

# ============================================
# Staging Database (shared postgres, separate DB)
# ============================================
# These override the production vault values for staging
vault_staging_db_password: "secure_staging_db_password_here"

# ============================================
# Staging Session Secret
# ============================================
vault_staging_session_secret: "random_32_char_string_for_staging_here"

# ============================================
# Staging AWS Credentials (optional - can reuse prod)
# ============================================
vault_staging_aws_access_key_id: "AKIAIOSFODNN7EXAMPLE"
vault_staging_aws_secret_access_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"

# ============================================
# Staging S3 Configuration
# ============================================
vault_staging_s3_bucket: "leviosa-staging"
vault_staging_s3_region: "eu-central-1"
vault_staging_s3_public_url: "https://s3.eu-central-1.amazonaws.com/leviosa-staging"
vault_staging_media_url: "https://s3.eu-central-1.amazonaws.com/leviosa-staging/media"

# ============================================
# Staging Stripe Test Keys
# ============================================
vault_staging_stripe_secret_key: "sk_test_your_stripe_test_secret_key"
vault_staging_stripe_publishable_key: "pk_test_your_stripe_test_publishable_key"
vault_staging_stripe_webhook_secret: "whsec_your_stripe_test_webhook_secret"

# ============================================
# Staging Cron Secret
# ============================================
vault_staging_cron_secret: "change-me-staging-cron-secret-min-32-chars-random"

# ============================================
# Staging Sentry (optional)
# ============================================
vault_staging_sentry_dsn: ""
