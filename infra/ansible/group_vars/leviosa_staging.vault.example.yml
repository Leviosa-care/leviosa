---
# Leviosa Staging Environment Variables (Sensitive)
# This is an example file - create leviosa_staging.vault.yml with actual values
# Encrypt with: ansible-vault encrypt group_vars/leviosa_staging.vault.yml

# Staging Database (uses shared postgres from production)
staging_db_name: leviosa_staging
staging_db_user: leviosa
staging_db_password: "{{ vault_staging_db_password }}"

# Staging Redis (uses shared redis from production, different DB index)
staging_redis_db: 1

# Staging Session Secret
staging_session_secret: "{{ vault_staging_session_secret }}"

# AWS Credentials (can reuse production credentials)
staging_aws_access_key_id: "{{ vault_aws_access_key_id }}"
staging_aws_secret_access_key: "{{ vault_aws_secret_access_key }}"
staging_s3_bucket: "{{ vault_s3_bucket }}-staging"

# Email Configuration (can reuse production)
staging_smtp_from_email: "staging@{{ app_domain }}"
staging_smtp_from_name: "Leviosa Staging"

# Stripe Test Keys
staging_stripe_secret_key: "sk_test_your_stripe_test_secret_key"
staging_stripe_publishable_key: "pk_test_your_stripe_test_publishable_key"
staging_stripe_webhook_secret: "whsec_your_stripe_test_webhook_secret"

# Google OAuth (can use production or separate staging app)
staging_google_client_id: "{{ vault_google_client_id }}"
staging_google_client_secret: "{{ vault_google_client_secret }}"

# Staging-specific encryption
staging_user_encryption_key: "{{ vault_staging_user_encryption_key }}"
staging_logging_salt: "{{ vault_staging_logging_salt }}"

# Mock Data Mode (for testing)
staging_use_mock_data: "false"

# Vault variables (these should be in your main vault)
# vault_staging_db_password: "secure_password_here"
# vault_staging_session_secret: "random_32_char_string_here"
# vault_staging_user_encryption_key: "another_secure_key_here"
# vault_staging_logging_salt: "random_salt_here"
