name: 🛠️Deploy production application

on:
  push:
    tags:
      - 'v*.*.*'  # Matches v1.0.0, v2.1.3, etc.
  workflow_dispatch:  # Optional: manual production deploy button

permissions:
  actions: write
  contents: read
  checks: write

jobs:
  front:
      name: 🌐 production front
      runs-on: ubuntu-latest
      steps:
        - name: ⬇️ Checkout repo
          uses: actions/checkout@v4.2.2
        - name: frontend actions
          uses: ./.github/actions/workflow-actions/front-build
          with:
            tag: 'production-frontend'
            dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
            dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
            folder: frontend
  back:
      name: 🛢 production Back
      runs-on: ubuntu-latest
      steps:
        - name: ⬇️ Checkout repo
          uses: actions/checkout@v4.2.2
        - name: backend actions
          uses: ./.github/actions/workflow-actions/back-build
          with:
            go-version: '1.24.2'
            build-path: './cmd/leviosa/*.go'
            test-path: './...'
            output-name: 'leviosa'
            tag: 'production-backend'
            dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
            dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
            folder: backend
  scan-images:
    needs: [front, back]
    name: 🔒 Security Scan Images
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔍 Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'henga/leviosa:production-frontend'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: 🔍 Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'henga/leviosa:production-backend'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  deploy:
    needs: [front, back, scan-images]
    name: 🚀 Deploy production
    runs-on: [self-hosted]
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4.2.2
      - uses: ./.github/actions/workflow-actions/deploy-app
        with:
          filter: 'production'
          app_env: 'production'
          backend_port: 3500
          port: 3000
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          aws_region: ${{ secrets.AWS_REGION }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          bucketname: ${{ secrets.BUCKETNAME }}
          stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          gmail_email: ${{ secrets.GMAIL_EMAIL }}
          gmail_password: ${{ secrets.GMAIL_PASSWORD }}
          google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          redis_addr: ${{ secrets.REDIS_ADDR }}
          redis_password: ${{ secrets.REDIS_PASSWORD }}
          redis_db: ${{ secrets.REDIS_DB }}
          user_encryption_key: ${{ secrets.USER_ENCRYPTION_KEY }}
          logging_salt: ${{ secrets.LOGGING_SALT }}
