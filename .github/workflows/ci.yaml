name: 🧪 CI - Pull Request Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write

jobs:
  frontend-checks:
    name: 🌐 Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.5

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: 'pnpm'
          cache-dependency-path: './frontend/pnpm-lock.yaml'

      - name: 📦 Install dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: ⚡️ Cache .svelte-kit
        uses: actions/cache@v4
        with:
          path: ./frontend/.svelte-kit
          key: ${{ runner.os }}-svelte-kit-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-svelte-kit-

      - name: 🏗️ Build SvelteKit project
        working-directory: ./frontend
        run: pnpm run build

      - name: 🧪 Run unit tests
        working-directory: ./frontend
        run: pnpm run test:unit

  backend-checks:
    name: 🛢 Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Setup Go
        uses: actions/setup-go@v5.3.0
        with:
          go-version: '1.24.2'

      - name: 📦 Setup test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates build-essential
          sudo update-ca-certificates

      - name: 📥 Download Go modules
        working-directory: ./backend
        run: go mod download

      - name: ⬣ Build application
        working-directory: ./backend
        env:
          CGO_ENABLED: 1
          GOOS: linux
        run: go build -ldflags="-s" -v -o leviosa ./cmd/app/main.go

      - name: 🧪 Run unit tests
        working-directory: ./backend
        env:
          CGO_ENABLED: 1
          GOOS: linux
        run: go test ./...

  backend-integration-tests:
    name: 🧪 Backend Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Setup Go
        uses: actions/setup-go@v5.3.0
        with:
          go-version: '1.24.2'

      - name: 📦 Setup test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates build-essential
          sudo update-ca-certificates

      - name: 📥 Download Go modules
        working-directory: ./backend
        run: go mod download

      - name: 🐳 Ensure Docker is running
        run: docker ps

      - name: 🧪 Run authuser integration tests
        working-directory: ./backend/authuser
        run: make ti

      - name: 🧪 Run catalog integration tests
        working-directory: ./backend/catalog
        run: make ti

      - name: 🧪 Run settings integration tests
        working-directory: ./backend/settings
        run: make ti

      - name: 🧪 Run notification integration tests
        working-directory: ./backend/notification
        run: make ti

  security-scan:
    name: 🔒 Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Setup Go
        uses: actions/setup-go@v5.3.0
        with:
          go-version: '1.24.2'

      - name: 🔍 Run govulncheck
        working-directory: ./backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  summary:
    name: ✅ CI Summary
    runs-on: ubuntu-latest
    needs: [frontend-checks, backend-checks, backend-integration-tests, security-scan]
    if: always()
    steps:
      - name: Check CI Results
        run: |
          if [ "${{ needs.frontend-checks.result }}" != "success" ] || \
             [ "${{ needs.backend-checks.result }}" != "success" ] || \
             [ "${{ needs.backend-integration-tests.result }}" != "success" ] || \
             [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "❌ CI checks failed"
            exit 1
          else
            echo "✅ All CI checks passed"
          fi
