name: ${APP_ENV}

services:
  caddy:
    image: caddy:2
    deploy:
      replicas: 1
      placement:
        constraint:
        - node.role = manager
    ports:
    - "80:80"
    - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    depends_on:
      - backend
    networks:
      - backend-network

  vault:
    image: hashicorp/vault:1.19
    container_name: vault
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    volumes:
      - vault-logs:/vault/logs
      - ./config/vault:/vault/config
    environment:
      - VAULT_ADDR=http://0.0.0.0:8200
      - VAULT_API_ADDR=http://0.0.0.0:8200
      - AWS_ACCESS_KEY_ID=${VAULT_AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${VAULT_AWS_SECRET_ACCESS_KEY}
    command: ["vault", "server", "-config=/vault/config/vault.hcl"]
    restart: unless-stopped
    networks:
      - vault-network

  frontend:
    depends_on:
      backend:
        condition: service_healthy
    image: henga/leviosa:${APP_ENV}-frontend
    container_name: ${APP_ENV}-frontend-${GITHUB_RUN_ID}
    # environment:
    args:
      - API_URL=backend:${BACKEND_PORT}
      - PORT=${PORT}
      - SESSION_COOKIE_NAME="leviosa_session"
      - CLIENT_IP_HEADER="x-client-ip"
    restart: unless-stopped
    user: runner
    ports:
      - "127.0.0.1:${PORT}:${PORT}"
    networks:
      - frontend-network
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    depends_on:
      redis:
        condition: service_healthy
      vault-agent:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    image: henga/leviosa:${APP_ENV}-backend
    container_name: ${APP_ENV}-backend-${GITHUB_RUN_ID}
    user: runner
    networks:
      - frontend-network
      - backend-network
      - loki-net
    volumes:
      - backend_data:/app/data
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    environment:
      - APP_ENV=${APP_ENV}
      - BACKEND_PORT=${BACKEND_PORT}
      - AWS_REGION 
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - USER_ENCRYPTION_KEY
      - LOGGING_SALT
      - GMAIL_EMAIL
      - GMAIL_PASSWORD
      - STRIPE_SECRET_KEY
      - REDIS_ADDR
      - REDIS_DB
      - REDIS_PASSWORD
      - FRONTEND_ORIGIN=frontend:${PORT}
      - SESSION_COOKIE_NAME="example_session"
      - CLIENT_IP_HEADER="x-client-ip"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${BACKEND_PORT}/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  vault-agent:
    image: hashicorp/vault:1.19
    command: >
      agent -config=/vault/config/agent.hcl
    volumes:
      - secrets:/secrets
      - ./vault:/vault/config
      - /run/secrets:/run/secrets:ro
    environment:
      # NOTE: make that an env variable ?
      VAULT_ADDR: https://leviosa-cluster-public-vault-9da92754.27b5d5f2.z1.hashicorp.cloud:8200
      secrets:
      - vault-role-id
      - vault-secret-id

  postgres:
    image: postgres:17.5-alpine3.21
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"                        # Management UI
    networks:
      - backend-network
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:alpine
    container_name: ${APP_ENV}-session-manager-${GITHUB_RUN_ID}
    user: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - backend-network
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"        # AMQP
      - "15672:15672"                        # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    networks:
      - backend-network

  loki:
    image: grafana/loki:2.9.4
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - loki-data:/loki
      - ./config/loki/loki.yaml:/etc/loki/loki.yaml:ro
    environment:
      AWS_ACCESS_KEY_ID: ${LOKI_AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${LOKI_AWS_SECRET_ACCESS_KEY}
    networks:
      - loki-net
    deploy:
      restart_policy:
        condition: on-failure

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    depends_on:
      - loki
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - loki-net
    deploy:
      restart_policy:
        condition: on-failure

  promtail:
    image: grafana/promtail:2.9.4
    volumes:
      - ./config/promtail/promtail.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
    networks:
      - loki-net

networks:
  frontend-network:
    name: ${APP_ENV}-frontend-network
    driver: bridge
  backend-network:
    name: ${APP_ENV}-backend-network
    driver: bridge
  loki-net:
    driver: overlay

volumes:
  secrets:
  pg_data:
  leviosa-logs:
  backend_data:
    name: ${APP_ENV}_backend_data
  grafana-storage:
    driver: local
  loki-data:
    driver: local

secrets:
  vault-role-id:
    external: true
  vault-secret-id:
    external: true

configs:
  caddyfile:
    external: true
